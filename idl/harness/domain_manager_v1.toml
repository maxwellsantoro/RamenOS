namespace = "domain.manager"
version = "1"
protocol = 768 # 0x300

[message.start_domain]
msg_type = 1
fields = ["request_id:u64", "domain_id:u64", "runner_kind:u32", "restart_policy:u32"]

[message.start_domain_reply]
msg_type = 2
fields = ["request_id:u64", "domain_id:u64", "status:u32", "generation:u32"]

[message.stop_domain]
msg_type = 3
fields = ["request_id:u64", "domain_id:u64"]

[message.stop_domain_reply]
msg_type = 4
fields = ["request_id:u64", "domain_id:u64", "status:u32", "generation:u32"]

[message.get_domain_status]
msg_type = 5
fields = ["request_id:u64", "domain_id:u64"]

[message.get_domain_status_reply]
msg_type = 6
fields = ["request_id:u64", "domain_id:u64", "status:u32", "state:u32", "generation:u32", "restart_count:u32"]

[message.report_exit]
msg_type = 7
fields = ["domain_id:u64", "exit_code:u32", "reason:u32"]

[message.report_exit_reply]
msg_type = 8
fields = ["domain_id:u64", "action:u32", "generation:u32", "restart_count:u32"]

[message.list_domains]
msg_type = 9
fields = ["request_id:u64"]

[message.list_domains_reply]
msg_type = 10
fields = ["request_id:u64", "total_domains:u32", "running_domains:u32", "restarting_domains:u32", "stopped_domains:u32"]

# Capability broker messages

[message.grant_capabilities]
msg_type = 11
# content_id_hash: 32-byte binary SHA256 hash (no "sha256:" prefix)
fields = ["request_id:u64", "domain_id:u64", "content_id_hash:bytes32"]

[message.grant_capabilities_reply]
msg_type = 12
fields = ["request_id:u64", "domain_id:u64", "status:u32", "handle_count:u32", "reserved:u32", "reserved2:u32"]

[message.get_domain_grant_handles]
msg_type = 15
fields = ["request_id:u64", "domain_id:u64"]

[message.get_domain_grant_handles_reply]
msg_type = 16
fields = [
  "request_id:u64",
  "domain_id:u64",
  "status:u32",
  "count:u32",
  "entry0_export_id:u16",
  "entry0_reserved:u16",
  "entry0_handle:u64",
  "entry1_export_id:u16",
  "entry1_reserved:u16",
  "entry1_handle:u64",
]

[message.revoke_capabilities]
msg_type = 13
fields = ["request_id:u64", "domain_id:u64"]

[message.revoke_capabilities_reply]
msg_type = 14
fields = ["request_id:u64", "domain_id:u64", "status:u32", "revoked_count:u32"]
